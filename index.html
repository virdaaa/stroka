        // Получить требуемый возраст для рейтинга
        function getRequiredAge(rating) {
            switch (rating) {
                case '18+': return 18;
                case '16+': return 16;
                case '12+': return 12;
                default: return 0;
            }
        }
        
        // Загрузить подтверждённый возраст
        async function loadConfirmedAge() {
            // Из localStorage
            confirmedAge = parseInt(localStorage.getItem('stroka_confirmed_age') || '0');
            
            // Из базы (если авторизован)
            if (currentUser && currentUser.id) {
                try {
                    var { data: author } = await db
                        .from('authors')
                        .select('confirmed_age')
                        .eq('id', currentUser.id)
                        .single();
                    
                    if (author && author.confirmed_age) {
                        var dbAge = author.confirmed_age;
                        // Берём максимум
                        if (dbAge > confirmedAge) {
                            confirmedAge = dbAge;
                            localStorage.setItem('stroka_confirmed_age', confirmedAge.toString());
                        }
                    }
                } catch (e) {
                    if (e.name !== 'AbortError') console.error('Error loading confirmed age:', e);
                }
            }
        }
        
        // Фильтр контента по возрасту
        function filterByAge(items) {
            return items.filter(function(item) {
                var requiredAge = getRequiredAge(item.age_rating);
                return confirmedAge >= requiredAge;
            });
        }
        
        async function init() {
            var savedUser = localStorage.getItem('stroka_user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
            } else {
                var { data: { user } } = await db.auth.getUser();
                currentUser = user;
            }
            
            // Загружаем подтверждённый возраст
            await loadConfirmedAge();
            
            showCachedData();
            
            if (currentUser) {
                await loadUserPreferences();
                await loadReadHistory();
            }
            
            await loadData();
            setupEventListeners();
            setupInfiniteScroll();
        }
        
        function showCachedData() {
            try {
                var cached = localStorage.getItem(CACHE_KEY);
                if (cached) {
                    var parsed = JSON.parse(cached);
                    if (parsed.filter === currentFilter && parsed.genre === currentGenre && Date.now() - parsed.timestamp < CACHE_TTL) {
                        allShorts = parsed.data;
                        displayedCount = 0;
                        renderFeed(true);
                    }
                }
            } catch (e) {
                if (e.name !== 'AbortError') console.error('Cache error:', e);
            }
        }
        
        function saveToCache() {
            try {
                var cacheData = { data: allShorts, timestamp: Date.now(), filter: currentFilter, genre: currentGenre };

            } catch (e) {

        async function loadData() {
            try {
                // Обработка вкладки "Подписки"
                if (currentFilter === 'subscriptions') {
                    await loadSubscriptionsFeed();
                    return;
                }

                var query = db.from('stories').select('*, authors (id, name, pen_name, avatar_url, bio), shorts (id, text, position)').eq('status', 'published');
                // Фильтрация по жанру выполняется на клиенте, т.к. genres - это JSONB массив
                if (currentFilter === 'new') {
                    query = query.order('published_at', { ascending: false });
                } else {
                    query = query.order('created_at', { ascending: false });
                }

                var { data: storiesData, error } = await query;
                if (error) throw error;
                
                stories = storiesData || [];
                var storyIds = stories.map(function(s) { return s.id; });
                
                var { data: reactionsData } = await db.from('reactions').select('story_id, reaction').in('story_id', storyIds);
                
                var statsMap = {};
                stories.forEach(function(s) { statsMap[s.id] = { views: s.views || 0, likes: 0, dislikes: 0 }; });
                (reactionsData || []).forEach(function(r) {
                    if (statsMap[r.story_id]) {
                        if (r.reaction === 'like') statsMap[r.story_id].likes++;
                        else if (r.reaction === 'dislike') statsMap[r.story_id].dislikes++;
                    }
                });
                
                shorts = [];
                stories.forEach(function(story) {
                    var stats = statsMap[story.id] || { views: 0, likes: 0, dislikes: 0 };
                    var totalReactions = stats.likes + stats.dislikes;
                    var likePercent = totalReactions > 0 ? Math.round(100 * stats.likes / totalReactions) : null;
                    
                    if (story.shorts) {
                        story.shorts.forEach(function(short) {
                            shorts.push({
                                id: short.id,
                                text: short.text,
                                position: short.position,
                                story_id: story.id,
                                title: story.title,
                                author: story.authors?.pen_name || story.authors?.name || 'Неизвестный автор',
                                author_id: story.authors?.id || null,
                                author_avatar: story.authors?.avatar_url || null,
                                author_bio: story.authors?.bio || '',
                                genres: story.genres || [],
                                subgenres: story.subgenres || [],
                                age_rating: story.age_rating || '16+',
                                reading_time: story.reading_time_minutes,
                                character_count: story.character_count,
                                views: stats.views,
                                like_percent: likePercent,
                                total_votes: totalReactions,
                                literacy_score: story.literacy_score,
                                literacy_note: story.literacy_note,
                                similar_to: story.similar_to,
                                published_at: story.published_at,
                                created_at: story.created_at
                            });
                        });
                    }
                });
                
                if (currentFilter === 'foryou') {
                    shorts = smartSort(shorts);
                }

                // Для вкладки "Новинки" — фильтруем прочитанное и берём один шортс
                if (currentFilter === 'new') {
                    // Группируем по story_id и берём только первый шортс
                    var storyGroups = {};
                    shorts.forEach(function(item) {
                        if (!storyGroups[item.story_id]) {
                            storyGroups[item.story_id] = item;
                        }
                    });
                    shorts = Object.values(storyGroups);

                    // Для авторизованных — показываем только непрочитанное
                    if (currentUser && readStoryIds.size > 0) {
                        shorts = shorts.filter(function(item) {
                            return !readStoryIds.has(item.story_id);
                        });
                    }
                }

                // Фильтрация по жанру на клиенте
                if (currentGenre) {
                    shorts = shorts.filter(function(s) {
                        if (!s.genres || !s.genres.length) return false;
                        return s.genres.some(function(g) {
                            return g.name === currentGenre;
                        });
                    });
                }

                // Показываем все рассказы в ленте, проверка возраста — при открытии
                allShorts = shorts;
                displayedCount = 0;
                updateGenreMenu(stories);
                saveToCache();
                renderFeed(false);
                
            } catch (error) {
                // Игнорируем AbortError — это нормально при навигации
                if (error.name === 'AbortError') return;
                console.error('Error loading data:', error);
                document.getElementById('feed').innerHTML = '<div class="empty-state"><div class="empty-state-icon">😕</div><div class="empty-state-text">Ошибка загрузки</div><div class="empty-state-subtext">' + error.message + '</div><button onclick="loadData()" style="margin-top: 16px; padding: 10px 20px; background: var(--accent); border: none; border-radius: 8px; color: var(--bg-primary); cursor: pointer;">Повторить</button></div>';
            }
        }

        function smartSort(items) {
            var now = Date.now();
            var hour48 = 48 * 60 * 60 * 1000;
            
            // Группируем шортсы по story_id
            var storyGroups = {};
            items.forEach(function(item) {
                if (!storyGroups[item.story_id]) {
                    storyGroups[item.story_id] = [];
                }
                storyGroups[item.story_id].push(item);
            });
            
            // Из каждой группы берём случайный шортс
            var uniqueItems = Object.keys(storyGroups).map(function(storyId) {
                var group = storyGroups[storyId];
                var randomIndex = Math.floor(Math.random() * group.length);
                return group[randomIndex];
            });
            
            var filtered = uniqueItems;
            if (readStoryIds.size > 0 && uniqueItems.length > 5) {
                var unread = uniqueItems.filter(function(item) { return !readStoryIds.has(item.story_id); });
                if (unread.length >= 3) filtered = unread;
            }
            
            var scored = filtered.map(function(item) {
                var score = Math.random() * 2;
                var storyDate = new Date(item.published_at || item.created_at).getTime();
                if (now - storyDate < hour48) score += 3;
                if (item.genres && item.genres.length > 0) {
                    item.genres.forEach(function(g) {
                        var genreName = g.name || g;
                        var weight = userPreferences[genreName] || 0;
                        score += weight * 0.5;
                    });
                }
                if (item.like_percent && item.like_percent > 70) score += 0.5;
                item.score = score;
                return item;
            });
            
            scored.sort(function(a, b) { return b.score - a.score; });
            
            var result = [];
            var authorCount = {};
            scored.forEach(function(item) {
                var author = item.author;
                var count = authorCount[author] || 0;
                if (count < 2) authorCount[author] = count + 1;
                result.push(item);
            });
            
            return result;
        }

        function setupEventListeners() {
            document.querySelectorAll('.top-tab[data-filter]').forEach(function(tab) {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.top-tab[data-filter]').forEach(function(t) { t.classList.remove('active'); });

                    currentFilter = tab.dataset.filter;
                    loadData();
                });
            });
            
            var genreBtn = document.getElementById('genre-btn');
            var genreMenu = document.getElementById('genre-menu');
            
            genreBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                genreMenu.classList.toggle('open');
            });
            
            document.addEventListener('click', function() { genreMenu.classList.remove('open'); });
            
            document.querySelectorAll('.genre-item').forEach(function(item) {
                item.addEventListener('click', function() {
                    document.querySelectorAll('.genre-item').forEach(function(i) { i.classList.remove('active'); });
                    item.classList.add('active');
                    currentGenre = item.dataset.genre;
                    genreBtn.textContent = currentGenre ? currentGenre + ' ▾' : 'Жанры ▾';
                    if (currentGenre) { genreBtn.classList.add('active'); } else { genreBtn.classList.remove('active'); }
                    genreMenu.classList.remove('open');
                    loadData();
                });
            });
        }

        function updateGenreMenu(storiesData) {
            var genreSet = {};
            (storiesData || []).forEach(function(story) {
                if (story.genres && story.genres.length > 0) {
                    story.genres.forEach(function(g) {
                        var name = g.name || g;
                        if (name) {
                            genreSet[name] = (genreSet[name] || 0) + 1;
                        }
                    });
                }
            });

            // Сортируем по количеству (популярности)
            var sortedGenres = Object.keys(genreSet).sort(function(a, b) {
                return genreSet[b] - genreSet[a];
            });

            var menu = document.getElementById('genre-menu');
            var html = '<div class="genre-item' + (currentGenre === '' ? ' active' : '') + '" data-genre="">Все жанры</div>';
            sortedGenres.forEach(function(genre) {
                html += '<div class="genre-item' + (currentGenre === genre ? ' active' : '') + '" data-genre="' + genre + '">' + genre + '</div>';
            });
            menu.innerHTML = html;

            // Перепривязываем события
            menu.querySelectorAll('.genre-item').forEach(function(item) {
                item.addEventListener('click', function() {
                    filterByGenre(item.dataset.genre);
                    menu.classList.remove('open');
                });
            });
        }

        function filterByGenre(genre) {
            currentGenre = genre;
            var genreBtn = document.getElementById('genre-btn');
            genreBtn.textContent = genre + ' ▾';
            genreBtn.classList.add('active');
            document.querySelectorAll('.genre-item').forEach(function(i) {
                i.classList.remove('active');
                if (i.dataset.genre === genre) i.classList.add('active');
            });
            loadData();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function searchByTag(tag) {
            window.location.href = '/search.html?tag=' + encodeURIComponent(tag);
        }

        function showAiReview(score, encodedNote) {
            var note = decodeURIComponent(encodedNote);
            var litClass = score < 6 ? 'low' : score <= 8 ? 'medium' : 'high';
            document.getElementById('ai-modal-score').textContent = score + '/10';
            document.getElementById('ai-modal-score').className = 'ai-modal-score-value ' + litClass;
            document.getElementById('ai-modal-text').textContent = note;
            document.getElementById('ai-modal').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeAiReview(event) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById('ai-modal').classList.remove('open');
            document.body.style.overflow = '';
        }

        var currentAuthorPopup = null;

        function showAuthorPopup(element, authorId, authorName, authorAvatar, authorBio) {
            // Закрыть предыдущий popup
            closeAuthorPopup();

            var initial = authorName[0].toUpperCase();
            var avatarStyle = authorAvatar ? 'background-image: url(' + authorAvatar + '); background-size: cover; background-position: center;' : '';
            var avatarContent = authorAvatar ? '' : initial;
            var bioText = authorBio || 'Автор на Строке';
            var popup = document.createElement('div');
            popup.className = 'author-popup open';
            popup.id = 'author-popup-active';
            popup.innerHTML = '<div class="author-popup-header">' +
                '<div class="author-popup-avatar" style="' + avatarStyle + '">' + avatarContent + '</div>' +
                '<div>' +
                    '<div class="author-popup-name">' + authorName + '</div>' +
                    '<div class="author-popup-stats">' + bioText + '</div>' +
                '</div>' +
            '</div>' +
            '<button class="author-popup-btn" onclick="searchAuthorStories(\'' + authorId + '\')">Все произведения автора</button>';

            element.style.position = 'relative';
            element.appendChild(popup);
            currentAuthorPopup = popup;

            // Закрыть при клике снаружи
            setTimeout(function() {
                document.addEventListener('click', closeAuthorPopupOnOutside);
            }, 10);
        }

        function closeAuthorPopupOnOutside(e) {
            if (currentAuthorPopup && !currentAuthorPopup.contains(e.target)) {
                closeAuthorPopup();
            }
        }

        function closeAuthorPopup() {
            if (currentAuthorPopup) {
                currentAuthorPopup.remove();
                currentAuthorPopup = null;
                document.removeEventListener('click', closeAuthorPopupOnOutside);
            }
        }

        function searchAuthorStories(authorId) {
            window.location.href = '/search.html?author_id=' + encodeURIComponent(authorId);
        }
        
        init();
    </script>
</body>
</html>
